project:
  type: ofce-website
  execute-dir: file
  post-render:
    - www/encrypt.R
execute:
  freeze: auto
profile:
  default: fr
  group:
    - - fr
      - en
toc: false
website:
  title: Page d'accueil
  site-url: https://www.ofce.fr/
  site-path: staging/site_ofce_servers
  repo-url: https://github.com/anissaOFCE/site_ofce_servers
  favicon: www/favicon.ico
  draft-mode: gone
  reader-mode: false
  bread-crumbs: false
  navbar:
    logo: www/logo.png
    logo-alt: logo de l'OFCE
    logo-href: https://www.ofce.fr/
    background: white
    left:
      - text: Accueil
        href: https://www.ofce.fr/index.html
      - text: Staging
        href: index.qmd
    tools:
      - icon: envelope
        href: '#'
      - icon: bluesky
        href: https://bsky.app/profile/ofce.bsky.social
      - icon: linkedin
        href: https://www.linkedin.com/company/ofce/posts/
      - icon: facebook
        href: https://www.facebook.com/ofcesciencespo/
  other-links:
    - text: Page d'accueil
      icon: newspaper
      href: https://www.ofce.fr/staging/site_ofce_servers/index.html
    - text: une autre page
      icon: newspaper
      href: https://www.ofce.fr/staging/site_ofce_servers/autres_page.html
    - text: Page
      icon: newspaper
      href: https://www.ofce.fr/staging/site_ofce_servers/sub/page.html
  comments:
    hypothesis: true
  search:
    show-item-context: true
    type: overlay
filters:
  - quarto
  - social-share
format:
  ofce-website-html: default
ofce_host: true
